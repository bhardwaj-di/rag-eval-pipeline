name: Keepalive

on:
  schedule:
    - cron: '0 9 * * *'  # runs once daily at 9:00 AM UTC
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  ping-qdrant:
    name: Ping Qdrant Cluster
    runs-on: ubuntu-latest
    environment: 10k-finance-rag
    steps:
      - name: Check Qdrant health endpoint
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
        run: |
          CLEAN_URL="${QDRANT_URL%/}"
          echo "Pinging Qdrant at $CLEAN_URL/healthz ..."
          http_code=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" "$CLEAN_URL/healthz")
          echo "HTTP status: $http_code"
          [ "$http_code" = "200" ] && echo "Qdrant is alive." || (echo "Qdrant ping failed." && exit 1)

  ping-streamlit:
    name: Ping Streamlit App
    runs-on: ubuntu-latest
    environment: 10k-finance-rag
    steps:
      - name: Wake up Streamlit app
        run: |
          echo "Pinging Streamlit app..."
          curl -sf --max-time 60 "${{ secrets.STREAMLIT_URL }}" -o /dev/null \
            && echo "Streamlit is alive." \
            || echo "Streamlit ping returned non-200 (may still be waking up, not failing the job)."
